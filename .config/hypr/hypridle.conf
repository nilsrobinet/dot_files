general {
  # Don’t idle while something is playing audio, etc.
  # (remove if you want strict idling)
  ignore_dbus_inhibit = false

  lock_cmd = pidof hyprlock || hyprlock
  before_sleep_cmd = pidof hyprlock || hyprlock
  after_sleep_cmd = hyprctl dispatch dpms on
}

# Lock after 5 minutes idle
listener {
  timeout = 900
  on-timeout = pidof hyprlock || hyprlock
}

# Turn monitors off after 10 minutes idle
listener {
  timeout = 930
  on-timeout =  sh -lc 'playerctl -a status 2>/dev/null | grep -q "^Playing$" || hyprctl dispatch dpms off'
  on-resume =  hyprctl dispatch dpms on
}

# Hibernate after 15 minutes idle
listener {
  timeout = 1200
  on-timeout = sh -lc 'playerctl -a status 2>/dev/null | grep -q "^Playing$" || systemctl suspend'
}
