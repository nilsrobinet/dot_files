general {
  disable_loading_bar = true
  hide_cursor = true
  grace = 0
}

background {
  color = rgba(10, 12, 14, 1.0)
  blur_passes = 3
  blur_size = 7
}

# Time (primary = greenish)
label {
  text = $TIME
  font_size = 72
  position = 0, 120
  halign = center
  valign = center
  color = rgba(128, 255, 128, 0.96) # #80FF80
}

label {
  # Date via command (works on v0.9.5)
  text = cmd[update:1000] date +"%A · %d.%m.%Y"
  font_size = 18
  position = 0, 40
  halign = center
  valign = bottom
  color = rgba(153, 255, 235, 0.70) # #99ffeb
}

input-field {
  size = 320, 56
  position = 0, -10
  halign = center
  valign = center

  dots_center = true
  dots_size = 0.30
  dots_spacing = 0.35
  fade_on_empty = true

  placeholder_text = "Password"
  font_color = rgba(230, 255, 235, 0.92)

  outline_thickness = 2
  # More green presence in the border
  outer_color = rgba(128, 255, 128, 0.40) # green
  inner_color = rgba(0, 0, 0, 0.38)

  # States
  check_color = rgba(128, 255, 128, 0.90)  # green
  fail_color  = rgba(255, 90, 90, 0.92)
}

